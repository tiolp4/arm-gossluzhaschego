<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>АРМ Госслужащего</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Боковая панель -->
  <aside class="sidebar">
    <div class="sidebar__top">
      <button class="sidebar__btn sidebar__btn--active" title="Главная">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12l9-9 9 9"/>
          <path d="M5 10v10a1 1 0 001 1h3a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1h3a1 1 0 001-1V10"/>
        </svg>
      </button>

      <button class="sidebar__btn" title="Почта">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M22 4L12 13 2 4"/>
        </svg>
      </button>

      <button class="sidebar__btn" title="Документооборот">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
          <polyline points="14,2 14,8 20,8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </button>

      <button class="sidebar__btn" title="Уведомления">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 01-3.46 0"/>
        </svg>
        <span class="sidebar__badge">5</span>
      </button>

      <button class="sidebar__btn" title="Настройки">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
    </div>

    <div class="sidebar__bottom">
      <div class="power-wrapper">
        <!-- Popup меню -->
        <div class="power-menu" id="powerMenu">
          <!-- Выйти из системы -->
          <button class="power-menu__item" id="logoutBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
              <polyline points="16,17 21,12 16,7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            <span>Выйти из системы</span>
          </button>
          <div class="power-menu__divider"></div>
          <!-- Перезагрузить -->
          <button class="power-menu__item" id="rebootBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="23,4 23,10 17,10"/>
              <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
            </svg>
            <span>Перезагрузить</span>
          </button>
          <div class="power-menu__divider"></div>
          <!-- Выключить -->
          <button class="power-menu__item power-menu__item--danger" id="shutdownBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18.36 6.64a9 9 0 11-12.73 0"/>
              <line x1="12" y1="2" x2="12" y2="12"/>
            </svg>
            <span>Выключить</span>
          </button>
        </div>

        <!-- Кнопка питания -->
        <button class="sidebar__btn sidebar__btn--power" title="Питание" id="powerBtn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18.36 6.64a9 9 0 11-12.73 0"/>
            <line x1="12" y1="2" x2="12" y2="12"/>
          </svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- Контент -->
  <div class="app-wrapper">
    <header class="header">
      <div class="header__left">
        <div class="header__logo">
          <svg class="header__logo-icon" width="40" height="40" viewBox="0 0 40 40" fill="none">
            <polygon points="20,2 26,10 20,8 14,10" fill="#E53935"/>
            <polygon points="20,8 26,10 24,18 20,14 16,18 14,10" fill="#E53935"/>
            <polygon points="14,10 10,14 12,18 16,18" fill="#E53935"/>
            <polygon points="26,10 30,14 28,18 24,18" fill="#E53935"/>
            <polygon points="2,20 10,14 10,26" fill="#E53935"/>
            <polygon points="38,20 30,14 30,26" fill="#E53935"/>
            <polygon points="20,38 14,30 20,32 26,30" fill="#E53935"/>
            <polygon points="14,30 10,26 16,22 20,32" fill="#E53935"/>
            <polygon points="26,30 30,26 24,22 20,32" fill="#E53935"/>
            <polygon points="16,22 12,18 20,14 24,18 28,18 24,22 20,26" fill="#E53935"/>
          </svg>
        </div>
        <div class="header__title">
          <span class="header__title-top">АРМ</span>
          <span class="header__title-bottom">ГОССЛУЖАЩЕГО</span>
        </div>
      </div>
      <div class="header__right">
        <svg class="header__user-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="1.5">
          <path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5z"/>
          <path d="M20 21c0-3.3-3.6-6-8-6s-8 2.7-8 6"/>
        </svg>
        <span class="header__user-name">Иванов И. И.</span>
      </div>
    </header>

    <main class="main">
      <div class="content">
        <div class="top-cards">
          <div class="top-card top-card--support">
            <div class="top-card__content">
              <span class="top-card__title">Техническая поддержка</span>
              <span class="top-card__badge">2</span>
            </div>
            <div class="top-card__icon">
              <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                <circle cx="32" cy="28" r="12" fill="rgba(255,255,255,0.2)"/>
                <path d="M20 28c0-6.6 5.4-12 12-12s12 5.4 12 12" stroke="rgba(255,255,255,0.4)" stroke-width="3" fill="none"/>
                <rect x="16" y="24" width="6" height="12" rx="3" fill="rgba(255,255,255,0.35)"/>
                <rect x="42" y="24" width="6" height="12" rx="3" fill="rgba(255,255,255,0.35)"/>
                <path d="M28 38c0 0 2 4 4 4s4-4 4-4" stroke="rgba(255,255,255,0.4)" stroke-width="2" fill="none"/>
              </svg>
            </div>
          </div>

          <div class="top-card top-card--notifications">
            <div class="top-card__content">
              <span class="top-card__title">Уведомления</span>
              <span class="top-card__badge">5</span>
            </div>
            <div class="top-card__icon">
              <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                <path d="M32 8c-10 0-16 6-16 16v10l-4 6h40l-4-6V24c0-10-6-16-16-16z" fill="rgba(255,255,255,0.3)"/>
                <ellipse cx="32" cy="50" rx="5" ry="4" fill="rgba(255,255,255,0.35)"/>
              </svg>
            </div>
          </div>
        </div>

        <div class="service-cards">
          <div class="service-card">
            <div class="service-card__top">
              <div class="service-card__info">
                <h3 class="service-card__title">Почта</h3>
                <p class="service-card__subtitle">@e-mordovia.ru</p>
              </div>
              <div class="service-card__icon service-card__icon--mail">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                  <rect x="2" y="4" width="20" height="16" rx="2" fill="#FFA726"/>
                  <path d="M22 4L12 13 2 4" stroke="#fff" stroke-width="1.5" fill="none"/>
                </svg>
              </div>
            </div>
            <div class="service-card__buttons">
              <button class="btn btn--primary">Войти</button>
              <button class="btn btn--outline">Поддержка</button>
            </div>
          </div>

          <div class="service-card">
            <div class="service-card__top">
              <div class="service-card__info">
                <h3 class="service-card__title">Электронный документооборот</h3>
                <p class="service-card__subtitle">СЭД "Дело"</p>
              </div>
              <div class="service-card__icon service-card__icon--docs">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                  <rect x="3" y="2" width="18" height="20" rx="2" fill="#5C6BC0"/>
                  <rect x="7" y="5" width="2" height="14" rx="1" fill="#9FA8DA"/>
                  <rect x="11" y="7" width="2" height="12" rx="1" fill="#C5CAE9"/>
                  <rect x="15" y="4" width="2" height="15" rx="1" fill="#9FA8DA"/>
                </svg>
              </div>
            </div>
            <div class="service-card__buttons">
              <button class="btn btn--primary">Войти</button>
              <button class="btn btn--outline">Поддержка</button>
            </div>
          </div>

          <div class="service-card">
            <div class="service-card__top">
              <div class="service-card__info">
                <h3 class="service-card__title">Межведомственное взаимодействие</h3>
                <p class="service-card__subtitle">АИС СИУ</p>
              </div>
              <div class="service-card__icon service-card__icon--inter">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
                  <rect x="3" y="2" width="18" height="20" rx="2" fill="#26A69A"/>
                  <rect x="6" y="6" width="12" height="2" rx="1" fill="rgba(255,255,255,0.7)"/>
                  <rect x="6" y="10" width="12" height="2" rx="1" fill="rgba(255,255,255,0.7)"/>
                  <rect x="6" y="14" width="8" height="2" rx="1" fill="rgba(255,255,255,0.7)"/>
                  <circle cx="18" cy="18" r="4" fill="#EF5350"/>
                  <path d="M16.5 18l1 1 2.5-2.5" stroke="#fff" stroke-width="1.2" fill="none"/>
                </svg>
              </div>
            </div>
            <div class="service-card__buttons">
              <button class="btn btn--primary">Войти</button>
              <button class="btn btn--outline">Поддержка</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
